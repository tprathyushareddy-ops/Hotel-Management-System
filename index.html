<!DOCTYPE html>
<html>
<head>
<title>Smart & Secure Hotel Management Platform</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

h1{
background:#2c3e50;
color:white;
padding:15px;
}

button{
padding:10px;
margin:5px;
background:#3498db;
color:white;
border:none;
cursor:pointer;
}

table{
margin:auto;
border-collapse:collapse;
width:70%;
background:white;
}

th,td{
border:1px solid black;
padding:10px;
}

th{
background:#2ecc71;
}
</style>
</head>

<body>

<h1>Smart & Secure Hotel Reservation Platform</h1>

<br>

<button onclick="displayRooms()">Display Rooms</button>
<button onclick="bookRoom()">Book Room</button>
<button onclick="cancelRoom()">Cancel Booking</button>
<button onclick="searchRoom()">Search Room</button>
<button onclick="sortRooms()">Sort By Price</button>

<br><br>

<table id="roomTable">
<tr>
<th>Room No</th>
<th>Type</th>
<th>Price</th>
<th>Status</th>
</tr>
</table>

<script>

let rooms = [
{number:101,type:"AC",price:3000,booked:false},
{number:102,type:"Non AC",price:1500,booked:false},
{number:103,type:"Deluxe",price:5000,booked:false},
{number:104,type:"Suite",price:7000,booked:false}
];

function displayRooms(){

let table=document.getElementById("roomTable");
table.innerHTML=`<tr>
<th>Room No</th>
<th>Type</th>
<th>Price</th>
<th>Status</th>
</tr>`;

rooms.forEach(r=>{
table.innerHTML+=`
<tr>
<td>${r.number}</td>
<td>${r.type}</td>
<td>${r.price}</td>
<td>${r.booked?"Booked":"Available"}</td>
</tr>`;
});

}

function bookRoom(){

let num=prompt("Enter Room Number to Book");

let room=rooms.find(r=>r.number==num);

if(room){
if(!room.booked){
room.booked=true;
alert("Room booked successfully");
}
else{
alert("Room already booked");
}
}
else{
alert("Room not found");
}

displayRooms();
}

function cancelRoom(){

let num=prompt("Enter Room Number to Cancel Booking");

let room=rooms.find(r=>r.number==num);

if(room){
if(room.booked){
room.booked=false;
alert("Booking cancelled");
}
else{
alert("Room was not booked");
}
}
else{
alert("Room not found");
}

displayRooms();
}

function searchRoom(){

let num=prompt("Enter Room Number to Search");

let room=rooms.find(r=>r.number==num);

if(room){
alert("Room "+room.number+" | "+room.type+" | Price:"+room.price+" | "+(room.booked?"Booked":"Available"));
}
else{
alert("Room not found");
}

}

function sortRooms(){

rooms.sort((a,b)=>a.price-b.price);
displayRooms();

}

displayRooms();

</script>

</body>
</html>
